<div class="categorias-container">
    <h1>💳 Categorias</h1>
    
    <div class="form-adicionar">
        <h2>Categorias</h2>
        <button class="btn btn-primary" onclick="abrirModalNovaCategoria()">Nova Categoria</button>
    </div>

    <div class="tabela-container">
        <h2>Categorias Cadastradas</h2>
        <table id="tabelaCategorias" class="tabela-categorias">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoCategorias">
                <!-- Preenchido por JavaScript -->
            </tbody>
        </table>
        <div id="mensagemVazia" class="mensagem-vazia">
            Nenhuma categoria cadastrada. Adicione uma acima!
        </div>
    </div>
</div>

<!-- Modal de Edição/Criação -->
<div id="modalEdicao" class="modal-overlay" onclick="fecharModalEdicao(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="modalTituloCategoria">Editar Categoria</h2>
            <button class="modal-close" onclick="fecharModalEdicao()">&times;</button>
        </div>
        
        <form id="formEdicao" onsubmit="salvarEdicao(event)">
            <div class="form-group">
                <label for="editNome">Nome da Categoria:</label>
                <input 
                    type="text" 
                    id="editNome" 
                    placeholder="Ex: Alimentação, Salário, Transporte..."
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="editTipo">Tipo:</label>
                <select id="editTipo" required>
                    <option value="">-- Selecione um tipo --</option>
                    <option value="Receita">Receita</option>
                    <option value="Despesa">Despesa</option>
                </select>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="fecharModalEdicao()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>
