<div class="categorias-container">

    <div class="form-adicionar">
        <h2>Lançamentos</h2>
        <button class="btn btn-primary" onclick="abrirModalNovoLancamento()">Novo Lançamento</button>
    </div>

    <div class="tabela-container">
        <h2>Lançamentos Cadastrados</h2>
        <div style="overflow-x: auto;">
            <table id="tabelaLancamentos" class="tabela-categorias" style="width: 100%; min-width: 1200px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Data Lançamento</th>
                        <th>Recorrência</th>
                        <th>Categoria</th>
                        <th>Fornecedor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoLancamentos">
                    <!-- Preenchido por JavaScript -->
                </tbody>
            </table>
        </div>
        <div id="mensagemVaziaLancamentos" class="mensagem-vazia">
            Nenhum lançamento cadastrado. Adicione um acima!
        </div>
    </div>
</div>

<!-- Modal de Edição de Lançamento -->
<div id="modalEdicaoLancamento" class="modal-overlay" onclick="fecharModalEdicaoLancamento(event)">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 700px; max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h2 id="modalTituloLancamento">Editar Lançamento</h2>
            <button class="modal-close" onclick="fecharModalEdicaoLancamento()">&times;</button>
        </div>

        <form id="formEdicaoLancamento" onsubmit="salvarEdicaoLancamento(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="editValorBruto">Valor Bruto:</label>
                    <input type="number" id="editValorBruto" step="0.01" required>
                </div>


                <div class="form-group">
                    <label for="editStatus">Status:</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span id="statusInativo">Inativo</span>
                        <input type="checkbox" id="editStatus" class="toggle-switch">
                        <span id="statusAtivo">Ativo</span>
                    </div>
                    <input type="hidden" id="editStatusValue" value="Inativo">
                </div>

                <div class="form-group">
                    <label for="editDataLancamento">Data de Lançamento:</label>
                    <input type="date" id="editDataLancamento" required readonly>
                </div>

                <div class="form-group">
                    <label for="editCategoria">Categoria:</label>
                    <select id="editCategoria" required></select>
                </div>

                <div class="form-group">
                    <label for="editFornecedor">Fornecedor:</label>
                    <select id="editFornecedor" required></select>
                </div>
                
                <div class="form-group">
                    <label for="editRecorrencia">Recorrência:</label>
                    <select id="editRecorrencia" onchange="atualizarVisibilidadeRecorrenciaModal()">
                        <option value="avulso">Avulso</option>
                        <option value="parcelado">Parcelado</option>
                        <option value="recorrente">Mensal</option>
                    </select>
                </div>

                <div class="form-group" id="grupoEditRecorrencia" style="display: none;">
                    <label for="editRecorrencias">Número de vezes (deixe vazio para repetir indefinidamente):</label>
                    <input type="number" id="editRecorrencias" min="1" placeholder="Ex: 12">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="fecharModalEdicaoLancamento()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>
